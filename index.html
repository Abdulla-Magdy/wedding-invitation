<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف | عبدالله و أسماء</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap');

        :root {
            --gold-primary: #d4af37;
            --gold-light: #f9f1c0;
            --gold-dark: #aa8928;
            --bg-dark: #0a0d12;
            --text-white: #f5f5f5;
            --transition-speed: 1.4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Amiri', serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- Dynamic Background --- */
        #canvas-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1f2c 0%, #0a0d12 100%);
        }

        /* --- Main Container --- */
        .invitation-wrapper {
            width: 90%;
            max-width: 800px;
            padding: 60px 20px;
            z-index: 2;
            position: relative;
        }

        /* --- Staggered Animation Logic --- */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity var(--transition-speed) cubic-bezier(0.215, 0.61, 0.355, 1),
                        transform var(--transition-speed) cubic-bezier(0.215, 0.61, 0.355, 1);
            margin-bottom: 25px;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Typography --- */
        .basmala {
            font-size: 2rem;
            color: var(--gold-light);
            font-family: 'Reem Kufi', sans-serif;
            margin-bottom: 30px;
        }

        .quran-verse {
            font-size: 1.2rem;
            line-height: 2;
            color: rgba(255, 255, 255, 0.7);
            max-width: 650px;
            margin: 0 auto 40px auto;
        }

        .invitation-title {
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--gold-primary);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 40px;
        }

        /* --- Couple Names with Pulse Glow --- */
        .couple-names {
            font-size: 3.8rem;
            font-family: 'Reem Kufi', sans-serif;
            margin: 40px 0;
            color: var(--gold-light);
            animation: pulseGlow 4s ease-in-out infinite;
            line-height: 1.2;
        }

        .couple-names span.and {
            font-size: 1.8rem;
            display: block;
            color: var(--text-white);
            opacity: 0.5;
            margin: 10px 0;
        }

        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
            50% { text-shadow: 0 0 35px rgba(212, 175, 55, 0.7), 0 0 10px rgba(212, 175, 55, 0.4); }
